# Reads variables from a root `.env` file (see .env.docker.example).
#
#   cp .env.docker.example .env   # fill in API keys (DB defaults to the bundled postgres)
#   docker compose up --build
#
# By default the API talks to the bundled `postgres` service — no external account
# needed. To use Neon (or any managed Postgres) instead, set DATABASE_URL in .env;
# the standard pg driver connects to either.
#
# The api container migrates the DB and seeds the admin user on startup, so the
# only thing you must set is ADMIN_USERNAME / ADMIN_PASSWORD (JWT_SECRET is
# auto-generated on first boot and persisted to the api-data volume).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socialplanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialplanner}
      POSTGRES_DB: ${POSTGRES_DB:-socialplanner}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socialplanner}"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      # Defaults to the bundled postgres; override DATABASE_URL in .env for Neon/managed PG
      DATABASE_URL: ${DATABASE_URL:-postgresql://socialplanner:socialplanner@postgres:5432/socialplanner}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Leave empty to auto-generate a UUID on first boot (persisted to api-data).
      JWT_SECRET: ${JWT_SECRET:-}
      # The only credentials you need to set.
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      PORT: "4000"
    volumes:
      - api-data:/app/data
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      # Baked into the client bundle at build time. By default, uses relative path '/api'
      # which leverages Next.js Server-Side Rewrites to proxy to INTERNAL_API_URL at runtime,
      # making the build artifact fully environment-agnostic.
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api:4000}
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
  api-data:
